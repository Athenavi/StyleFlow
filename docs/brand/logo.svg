<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)" />
  <!-- S letter (Style) -->
  <text x="52" y="125" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white" transform="rotate(-5, 100, 100)">S</text>
  <!-- F letter (Flow) -->
  <text x="105" y="135" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="white" opacity="0.85" transform="rotate(3, 130, 110)">F</text>
  <!-- Sparkle icon -->
  <circle cx="155" cy="50" r="4" fill="white" opacity="0.9" />
  <circle cx="170" cy="65" r="2.5" fill="white" opacity="0.6" />
  <circle cx="45" cy="160" r="3" fill="white" opacity="0.5" />
  <!-- Wave line (flow) -->
  <path d="M35 170 Q65 155 100 170 Q135 185 165 170" stroke="white" stroke-width="2" fill="none" opacity="0.3" />
</svg>
